services:
  - type: web
    name: libralearn-backend
    runtime: node
    rootDir: LibraLearn-backend-main
    plan: free

    buildCommand: |
      apt-get update && apt-get install -y wget unzip ffmpeg
      wget https://github.com/DanielSWolf/rhubarb-lip-sync/releases/download/v1.13.0/Rhubarb-Lip-Sync-1.13.0-Linux.zip
      unzip Rhubarb-Lip-Sync-1.13.0-Linux.zip
      chmod +x Rhubarb-Lip-Sync-1.13.0-Linux/rhubarb
      mv Rhubarb-Lip-Sync-1.13.0-Linux/rhubarb /usr/local/bin/rhubarb
      npm ci

    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVEN_LABS_API_KEY
        sync: false
      - key: RHUBARB_PATH
        value: /usr/local/bin/rhubarb
